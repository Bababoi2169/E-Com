{% extends "base.html" %}
{% block title %}Create Account — ShopNest{% endblock %}

{% block head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - var(--nav-h) - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 0;
  }

  .auth-box { width: 100%; max-width: 440px; }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .auth-header p { color: var(--muted); font-size: 0.95rem; }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .auth-submit {
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0d0d0f;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .auth-submit:hover { background: var(--accent2); }

  .auth-footer {
    text-align: center;
    margin-top: 1.4rem;
    color: var(--muted);
    font-size: 0.875rem;
  }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }

  .strength-bar {
    height: 4px;
    border-radius: 4px;
    background: var(--border);
    margin-top: 6px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0;
    border-radius: 4px;
    transition: width 0.3s, background 0.3s;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-header">
      <h1>Create account</h1>
      <p>Join ShopNest and start shopping</p>
    </div>

    <div class="auth-card">
      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label for="username">Full name</label>
          <input type="text" id="username" name="username" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 6 characters" required oninput="checkStrength(this.value)" />
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required />
        </div>

        <button type="submit" class="auth-submit">Create Account →</button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>

<script>
  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9!@#$%^&*]/.test(val)) score++;
    const colors = ['#e05252','#f0a500','#e8c547','#52c47a'];
    const widths = ['25%','50%','75%','100%'];
    fill.style.width = score ? widths[score-1] : '0';
    fill.style.background = score ? colors[score-1] : '';
  }
</script>
{% endblock %}
